name: Build and Release Windows EXE

on:
  push:
    branches:
      - main # Triggers every time you push to the main branch

# Gives GitHub Actions permission to create/update releases
permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.architecture }}
    runs-on: windows-latest
    strategy:
      matrix:
        architecture: ['x64', 'x86'] # Runs this job twice: once for 64-bit, once for 32-bit

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.architecture }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller setuptools
          pip install -r requirements.txt

      - name: Build Executable with PyInstaller
        # Appends the architecture to the filename to distinguish them (e.g., Clipboard Cleaner-x64.exe)
        run: pyinstaller --noconsole --onefile --name "Clipboard Cleaner-${{ matrix.architecture }}" --icon "web/icon.ico" --add-data "web;web" clipboard_cleaner.pyw

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: exe-${{ matrix.architecture }}
          path: dist/Clipboard Cleaner-${{ matrix.architecture }}.exe

  release:
    name: Update GitHub Release
    needs: build # Waits for both 32-bit and 64-bit builds to finish
    runs-on: ubuntu-latest
    steps:
      - name: Download Built Executables
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true # Downloads both EXEs into the same folder

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Main Build"
          body: "Automated rolling release containing the latest 32-bit and 64-bit builds from the main branch."
          files: artifacts/*.exe
          prerelease: true # Keeps it marked as a pre-release so it acts like a rolling beta